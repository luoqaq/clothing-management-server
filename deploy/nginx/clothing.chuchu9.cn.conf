server {
    listen 80;
    listen [::]:80;
    server_name clothing.chuchu9.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/clothing/admin/dist;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name clothing.chuchu9.cn;

    ssl_certificate /etc/letsencrypt/live/clothing.chuchu9.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clothing.chuchu9.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/clothing/admin/dist;
    index index.html;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
